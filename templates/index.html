<!DOCTYPE html>
<html>
<head>
    <title>Caixeiro Viajante</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            text-align: center;
        }

        h1 {
            color: #333;
        }

        form {
            margin: 20px;
        }

        input {
            padding: 8px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 15px;
            margin: 5px;
            border: none;
            border-radius: 6px;
            background-color: #4CAF50;
            color: white;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background-color: #45a049;
        }

        table {
            margin: 20px auto;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        td {
            padding: 10px;
            border: 1px solid #ddd;
        }

        h2 {
            color: #555;
        }

        p {
            font-size: 18px;
            font-weight: bold;
        }

        .box {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 60%;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

    <h1>🚀 Calcular melhor distância</h1>
    <h2>Método: caixeiro vianjante</h2>

    <form method="post">
        <input type="number" name="n" placeholder="Tamanho (n)">
        <br><br>

        <button name="acao" value="problema">Gerar Problema</button>
        <button name="acao" value="solucao">Gerar Solução</button>
        <button name="acao" value="avaliar">Avaliar</button>
    </form>

    <div class="box">
        <h2>Matriz</h2>
        {% if matriz is not none %}
        <table>
            {% for linha in matriz %}
            <tr>
                {% for v in linha %}
                <td>{{ v }}</td>
                {% endfor %}
            </tr>
            {% endfor %}
        </table>
        {% endif %}
    </div>

    <div class="box">
        <h2>Solução</h2>
        <p>{{ solucao }}</p>
    </div>

    <div class="box">
        <h2>Distância</h2>
        <p>{{ distancia }}</p>
    </div>

</body>
</html>
